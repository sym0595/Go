<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="keywords" content="바둑과 오목, 바둑과오목, 온라인 바둑, 실시간 오목, 무료 바둑 게임, 무료 오목 게임, 친구랑 오목">
    <meta property="og:title" content="바둑과 오목 | 실시간 웹게임">
    <meta property="og:description" content="링크 클릭 한 번으로 친구와 바로 대결을 시작하세요!">
    <meta property="og:type" content="website">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="google-site-verification" content="fXm9jDvZofcCOtd11ECa365_EAtMH9R3NYFizxGTC3A" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .phone-container {
            width: 100%;
            min-height: 100%;
            max-width: 800px; 
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .lobby-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .lobby-title {
            color: #e4a853;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .lobby-subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .lobby-box {
            background-color: #222;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 320px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .lobby-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #e4a853, #c99243);
            color: #1a1a1a;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .lobby-input-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .lobby-input {
            flex: 1;
            height: 44px;
            background-color: #111;
            border: 1px solid #444;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            letter-spacing: 2px;
        }

        .lobby-input::placeholder {
            color: #555;
            font-size: 14px;
            letter-spacing: normal;
        }

        .lobby-btn-join {
            width: 80px;
            height: 44px;
            background-color: #333;
            color: #ccc;
            border: 1px solid #444;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .status-bar {
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 12px 16px;
            gap: 8px;
            border-bottom: 1px solid #333;
        }

        .network-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #111;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
        }

        .my-role-badge {
            font-weight: bold;
            color: #e4a853;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
        }
        .status-online {
            background-color: #2ecc71;
            color: #fff;
            box-shadow: 0 0 6px #2ecc71;
        }
        .status-offline {
            background-color: #e74c3c;
            color: #fff;
        }

        .btn-share {
            background: linear-gradient(135deg, #e4a853, #c99243);
            color: #1a1a1a;
            border: none;
            padding: 4px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .mode-selector-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2a2a2a;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .role-label {
            font-size: 12px;
            color: #aaa;
            font-weight: bold;
        }

        .role-btn-group {
            display: flex;
            gap: 6px;
        }

        .btn-role {
            background: none;
            border: none;
            color: #888;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-role.active {
            background-color: #e4a853;
            color: #1a1a1a;
        }

        .turn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .turn-badge {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #000;
            border: 1px solid #555;
        }

        .turn-badge.white { background-color: #fff; }

        .komi-badge {
            font-size: 11px;
            color: #ccc;
            background-color: #444;
            padding: 3px 8px;
            border-radius: 8px;
        }

        .capture-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
        }

        .game-area {
            flex: 1;
            min-height: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2a2a2a;
            padding: 10px;
        }

        .board-wrapper {
            width: 100%;
            max-width: 650px; 
            max-height: 100%;
            aspect-ratio: 1;
            background-color: #e4a853;
            border-radius: 4px;
            padding: 10px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid #443016; 
        }

        .board {
            display: grid;
            width: 100%;
            height: 100%;
            touch-action: manipulation;
        }

        .board.locked {
            opacity: 0.75;
            cursor: not-allowed;
        }

        .intersection {
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .intersection::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 0;
            border-top: 1px solid #443016;
            z-index: 1;
        }

        .intersection::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 0;
            border-left: 1px solid #443016;
            z-index: 1;
        }

        .intersection.edge-top::after { top: 50%; }
        .intersection.edge-bottom::after { bottom: 50%; }
        .intersection.edge-left::before { left: 50%; }
        .intersection.edge-right::before { right: 50%; }

        .intersection.star-point {
            background-image: radial-gradient(circle, #443016 1.5px, transparent 2px);
            background-position: center;
            background-repeat: no-repeat;
        }

        .stone {
            position: relative;
            width: 96%;
            height: 96%;
            border-radius: 50%;
            z-index: 3;
            transform: scale(0);
            transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            pointer-events: none;
        }
        .stone.placed { transform: scale(1); }
        .stone.black { background: radial-gradient(circle at 30% 30%, #444, #111 70%); }
        .stone.white { background: radial-gradient(circle at 30% 30%, #fff, #ddd 70%); border: 0.5px solid #bbb; }

        .stone.black.last-move::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background-color: #ffffff;
        }
        .stone.white.last-move::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background-color: #111111;
        }

        .preview-stone {
            width: 92%;
            height: 92%;
            border-radius: 50%;
            z-index: 2;
            opacity: 0.5;
            animation: blink 0.8s infinite alternate;
            pointer-events: none;
        }
        .preview-stone.black { background-color: #000; }
        .preview-stone.white { background-color: #fff; border: 1px solid #bbb; }

        @keyframes blink {
            from { opacity: 0.4; transform: scale(0.9); }
            to { opacity: 0.7; transform: scale(0.96); }
        }

        .control-panel {
            padding: 12px 16px;
            background-color: #222;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid #333;
        }

        .btn-confirm {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #e4a853, #c99243);
            color: #1a1a1a;
            border: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-confirm:disabled {
            background: #444;
            color: #777;
            cursor: not-allowed;
        }

        .sub-btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-sub {
            flex: 1;
            height: 38px;
            background-color: #333;
            color: #ccc;
            border: 1px solid #444;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-sub:disabled {
            background-color: #222;
            color: #555;
            border-color: #2a2a2a;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="phone-container">

    <div id="lobbyScreen" class="lobby-screen">
        <h1 class="lobby-title">바둑과 오목</h1>
        <p class="lobby-subtitle">친구와 함께 실시간으로 즐기세요</p>

        <div class="lobby-box">
            <button class="lobby-btn" onclick="createNewRoom()">새로운 방 만들기</button>
            
            <div style="margin: 20px 0; border-top: 1px dashed #444;"></div>
            
            <div style="font-size: 12px; color: #888; margin-bottom: 5px;">참여 코드가 있으신가요?</div>
            <div class="lobby-input-row">
                <input type="number" id="roomCodeInput" class="lobby-input" placeholder="4자리 입력" maxlength="4" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);">
                <button class="lobby-btn-join" onclick="joinRoomFromInput()">입장</button>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="network-row">
            <span>방 번호: <span id="txtRoomCodeDisplay" style="color:#e4a853; font-weight:bold; font-size: 14px;">----</span></span>
            <span>역할: <span id="txtMyRole" class="my-role-badge">대기 중</span></span>
            <span id="txtOpponentStatus" class="status-badge status-offline">🔴 접속 대기</span>
        </div>
        
        <div class="mode-selector-row">
            <span class="role-label">대국 종목:</span>
            <div class="role-btn-group">
                <button id="btnModeBaduk" class="btn-role active" onclick="syncGameMode('baduk')">바둑 (19칸)</button>
                <button id="btnModeOmok" class="btn-role" onclick="syncGameMode('omok')">오목 (렌주룰)</button>
            </div>
            <button class="btn-share" onclick="copyShareLink()">🔗 공유</button>
        </div>

        <div class="turn-row">
            <div class="turn-indicator">
                <div id="turnBadge" class="turn-badge"></div>
                <span id="turnText">대기실을 거쳐주세요</span>
            </div>
            <div id="lblKomi" class="komi-badge">규칙 대기중</div>
        </div>
        <div id="lblCapture" class="capture-row">
            <span>흑이 잡은 백돌: <span id="capByBlack">0</span>개</span>
            <span>백이 잡은 흑돌: <span id="capByWhite">0</span>개</span>
        </div>
    </div>

    <div class="game-area">
        <div class="board-wrapper">
            <div id="board" class="board"></div>
        </div>
    </div>

    <div class="control-panel">
        <button id="btnConfirm" class="btn-confirm" onclick="confirmPlacement()" disabled>➔ 착수 완료</button>
        <div class="sub-btn-row">
            <button id="btnCounting" class="btn-sub" onclick="requestAutoCounting()" disabled>🏁 계가 신청</button>
            <button class="btn-sub" onclick="resignGame()">🏳️ 기권하기</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBXYAjrswjYM3H1t8--Z1Fu9VN0mHk2aWE",
        authDomain: "gogo-e5fed.firebaseapp.com",
        projectId: "gogo-e5fed",
        storageBucket: "gogo-e5fed.firebasestorage.app",
        messagingSenderId: "336548824535",
        appId: "1:336548824535:web:23bc7ac26e2e9a9649b792",
        measurementId: "G-S5GPD8J09Q",
        databaseURL: "https://gogo-e5fed-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let roomId = null; 
    let roomRef = null;
    let presenceInterval = null;

    const urlParams = new URLSearchParams(window.location.search);
    const urlRoomId = urlParams.get('room');

    let userToken;
    try {
        userToken = localStorage.getItem('go_user_token_v2');
        if (!userToken) {
            userToken = 'u_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('go_user_token_v2', userToken);
        }
    } catch (e) {
        userToken = 'u_guest_' + Math.random().toString(36).substr(2, 9);
    }

    let gameMode = 'baduk'; 
    let boardSize = 19;
    let currentTurn = 'black';
    let myRole = 'spectator'; 
    
    let gameState = Array(boardSize).fill(null).map(() => Array(boardSize).fill(null));
    let koCoordinate = null; 
    const komi = 6.5;
    let capturedStones = { black: 0, white: 0 }; 
    let lastMove = null; 
    
    let selectedCell = null; 
    let previewStoneEl = null; 
    let starPoints = [];
    let lastRenderHash = ""; 

    const dr = [-1, 1, 0, 0]; const dc = [0, 0, -1, 1];

    const boardElement = document.getElementById('board');
    const turnBadge = document.getElementById('turnBadge');
    const turnText = document.getElementById('turnText');
    const capByBlackEl = document.getElementById('capByBlack');
    const capByWhiteEl = document.getElementById('capByWhite');
    const btnConfirm = document.getElementById('btnConfirm');
    const txtMyRole = document.getElementById('txtMyRole');
    const lblKomi = document.getElementById('lblKomi');
    const lblCapture = document.getElementById('lblCapture');
    const btnCounting = document.getElementById('btnCounting');
    const txtOpponentStatus = document.getElementById('txtOpponentStatus');

    function updateStarPoints() {
        starPoints = [];
        const lines = (boardSize === 19) ? [3, 9, 15] : [3, 7, 11];
        for (let r of lines) for (let c of lines) starPoints.push({r, c});
    }
    updateStarPoints();
    renderBoardFromState();

    if (urlRoomId && urlRoomId.length > 0) {
        document.getElementById('lobbyScreen').style.display = 'none';
        enterRoom(urlRoomId);
    } else {
        document.getElementById('lobbyScreen').style.display = 'flex';
    }

    function createNewRoom() {
        const newCode = Math.floor(1000 + Math.random() * 9000).toString(); 
        
        database.ref('go_rooms/' + newCode).once('value', snapshot => {
            if (snapshot.exists()) {
                createNewRoom(); 
            } else {
                enterRoom(newCode);
            }
        });
    }

    function joinRoomFromInput() {
        const code = document.getElementById('roomCodeInput').value.trim();
        if (!code || code.length !== 4) {
            alert("4자리 방 번호를 입력해주세요.");
            return;
        }
        database.ref('go_rooms/' + code).once('value', snapshot => {
            if (snapshot.exists()) {
                enterRoom(code);
            } else {
                alert("존재하지 않거나 게임이 끝난 방 번호입니다.\n새로운 방을 만들어보세요.");
            }
        });
    }

    function enterRoom(code) {
        roomId = code;
        document.getElementById('lobbyScreen').style.display = 'none';
        document.getElementById('txtRoomCodeDisplay').textContent = code; 
        
        const nextUrl = window.location.origin + window.location.pathname + '?room=' + code;
        window.history.pushState({path: nextUrl}, '', nextUrl);

        roomRef = database.ref('go_rooms/' + roomId);

        if(presenceInterval) clearInterval(presenceInterval);
        presenceInterval = setInterval(() => {
            if (myRole !== 'spectator' && roomRef) {
                roomRef.child('presence/' + myRole).set(Date.now());
            }
        }, 2000);

        roomRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                roomRef.set({
                    gameMode: gameMode,
                    gameState: JSON.stringify(gameState),
                    currentTurn: currentTurn,
                    capturedStones: capturedStones,
                    koCoordinate: null,
                    lastMove: null,
                    winner: null,
                    winReason: null, 
                    players: { black: userToken }
                });
                return;
            }

            if (data.players.black === userToken) { myRole = 'black'; txtMyRole.textContent = "흑돌 (나)"; } 
            else if (data.players.white === userToken) { myRole = 'white'; txtMyRole.textContent = "백돌 (나)"; } 
            else if (!data.players.white) { 
                roomRef.child('players/white').set(userToken); 
                myRole = 'white'; 
                txtMyRole.textContent = "백돌 (나)"; 
            } 
            else { 
                myRole = 'spectator'; 
                txtMyRole.textContent = "관전 모드"; 
            }

            gameMode = data.gameMode || 'baduk';
            const targetSize = (gameMode === 'omok') ? 15 : 19;
            
            if (boardSize !== targetSize || !gameState || gameState.length !== targetSize) {
                boardSize = targetSize;
                gameState = Array(boardSize).fill(null).map(() => Array(boardSize).fill(null));
            }
            
            gameState = JSON.parse(data.gameState);
            currentTurn = data.currentTurn;
            capturedStones = data.capturedStones || { black: 0, white: 0 };
            koCoordinate = data.koCoordinate;
            lastMove = data.lastMove || null; 

            if (data.players && data.presence) {
                const opponentRole = (myRole === 'black') ? 'white' : 'black';
                const opponentHasToken = data.players[opponentRole];
                const lastPing = data.presence[opponentRole];
                const now = Date.now();

                if (opponentHasToken) {
                    if (lastPing && (now - lastPing < 6000)) {
                        txtOpponentStatus.textContent = `🟢 ${opponentRole === 'white' ? '백돌' : '흑돌'} 입장 완료`;
                        txtOpponentStatus.className = "status-badge status-online";
                    } else {
                        txtOpponentStatus.textContent = "🔴 상대방 오프라인";
                        txtOpponentStatus.className = "status-badge status-offline";
                    }
                } else {
                    txtOpponentStatus.textContent = "🔴 상대방 대기 중";
                    txtOpponentStatus.className = "status-badge status-offline";
                }
            } else {
                txtOpponentStatus.textContent = "🔴 상대방 대기 중";
                txtOpponentStatus.className = "status-badge status-offline";
            }

            updateStarPoints();
            
            const currentRenderHash = (data.gameMode || 'baduk') + data.gameState + data.currentTurn + JSON.stringify(data.lastMove || null);
            if (lastRenderHash !== currentRenderHash) {
                renderBoardFromState();
                lastRenderHash = currentRenderHash; 
            }
            
            updateStatus();

            if (data.winner) {
                setTimeout(() => {
                    const winnerName = data.winner === 'black' ? '흑돌' : '백돌';
                    
                    if (data.winReason === 'resign') {
                        const loserName = data.winner === 'black' ? '백돌' : '흑돌';
                        alert(`🏳️ [기권 승] ${loserName}이(가) 기권하여 ${winnerName}이(가) 승리했습니다!\n확인을 누르면 판이 자동으로 초기화됩니다.`);
                    } else {
                        alert(`🎉 [오목 승리] ${winnerName} 승리!\n확인을 누르면 판이 자동으로 초기화됩니다.`);
                    }
                    
                    if (myRole === data.winner) {
                        syncResetGame();
                    }
                }, 100);
            }
        });
    }

    function copyShareLink() {
        if (!roomId) {
            alert("방에 입장한 후에 공유할 수 있습니다.");
            return;
        }
        const perfectUrl = window.location.origin + window.location.pathname + `?room=${roomId}`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(perfectUrl).then(() => {
                alert("🚀 링크 복사 완료! 카톡방에 공유하세요.\n(친구에게 번호 [ " + roomId + " ] 만 알려줘도 됩니다)");
            }).catch(() => { prompt("링크 주소:", perfectUrl); });
        } else { prompt("링크 주소:", perfectUrl); }
    }

    function renderBoardFromState() {
        const prevSelected = selectedCell;

        boardElement.innerHTML = '';
        boardElement.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
        boardElement.style.gridTemplateRows = `repeat(${boardSize}, 1fr)`;
        
        if (previewStoneEl) previewStoneEl = null;
        selectedCell = null;

        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                const intersection = document.createElement('div');
                intersection.classList.add('intersection');

                if (r === 0) intersection.classList.add('edge-top');
                if (r === boardSize - 1) intersection.classList.add('edge-bottom');
                if (c === 0) intersection.classList.add('edge-left');
                if (c === boardSize - 1) intersection.classList.add('edge-right');

                if (starPoints.some(pt => pt.r === r && pt.c === c)) intersection.classList.add('star-point');

                intersection.dataset.row = r;
                intersection.dataset.col = c;

                if (gameState && gameState[r] && gameState[r][c] !== null) {
                    const stone = document.createElement('div');
                    stone.classList.add('stone', gameState[r][c], 'placed');
                    
                    if (lastMove && lastMove.r === r && lastMove.c === c) {
                        stone.classList.add('last-move');
                    }
                    
                    intersection.appendChild(stone);
                } else {
                    intersection.addEventListener('click', () => selectIntersection(r, c, intersection));

                    if (prevSelected && prevSelected.r === r && prevSelected.c === c && currentTurn === myRole) {
                        selectedCell = { r: r, c: c, element: intersection };
                        previewStoneEl = document.createElement('div');
                        previewStoneEl.classList.add('preview-stone', currentTurn);
                        intersection.appendChild(previewStoneEl);
                    }
                }
                boardElement.appendChild(intersection);
            }
        }
    }

    function selectIntersection(row, col, element) {
        if (currentTurn !== myRole || myRole === 'spectator') return; 
        if (previewStoneEl) previewStoneEl.remove();

        selectedCell = { r: row, c: col, element: element };
        previewStoneEl = document.createElement('div');
        previewStoneEl.classList.add('preview-stone', currentTurn);
        element.appendChild(previewStoneEl);
    }

    function confirmPlacement() {
        if (currentTurn !== myRole || !selectedCell) return;
        const { r: row, c: col } = selectedCell;

        if (gameMode === 'omok') {
            if (currentTurn === 'black') {
                if (checkRenjuFouls(row, col)) {
                    if (previewStoneEl) { previewStoneEl.remove(); previewStoneEl = null; }
                    selectedCell = null; return;
                }
            }

            gameState[row][col] = currentTurn;

            let isWin = false;
            if (currentTurn === 'white') {
                for (let i = 0; i < 4; i++) { if (countContinuous(row, col, i, 'white') >= 5) isWin = true; }
            } else {
                for (let i = 0; i < 4; i++) { if (countContinuous(row, col, i, 'black') === 5) isWin = true; }
            }

            const opponentTurn = currentTurn === 'black' ? 'white' : 'black';
            const nextMoveInfo = { r: row, c: col };

            if (isWin) {
                if(roomRef) {
                    roomRef.update({
                        gameState: JSON.stringify(gameState), 
                        lastMove: nextMoveInfo,
                        winner: currentTurn,
                        winReason: 'gomoku' 
                    }).catch(()=>{});
                }
                
                currentTurn = opponentTurn;
                updateStatus();
                renderBoardFromState();
                return; 
            }

            currentTurn = opponentTurn;
            updateStatus();
            renderBoardFromState();

            if(roomRef) {
                roomRef.update({
                    gameState: JSON.stringify(gameState), currentTurn: opponentTurn,
                    capturedStones: capturedStones, koCoordinate: null, lastMove: nextMoveInfo
                }).catch(()=>{});
            }
        } 
        else {
            if (koCoordinate && koCoordinate.r === row && koCoordinate.c === col) { alert("패 규칙 구역입니다."); return; }

            gameState[row][col] = currentTurn;
            const opponentTurn = currentTurn === 'black' ? 'white' : 'black';
            const currentCaptured = [];
            const groupsToCapture = [];

            for (let i = 0; i < 4; i++) {
                const nr = row + dr[i], nc = col + dc[i];
                if (inBounds(nr, nc) && gameState[nr][nc] === opponentTurn) {
                    const group = findGroup(nr, nc, opponentTurn);
                    if (countLiberties(group) === 0) {
                        if (!groupsToCapture.some(g => g[0].r === group[0].r && g[0].c === group[0].c)) groupsToCapture.push(group);
                    }
                }
            }

            for (const group of groupsToCapture) {
                for (const cell of group) { gameState[cell.r][cell.c] = null; currentCaptured.push(cell); }
            }

            if (currentCaptured.length > 0) {
                if (currentTurn === 'black') capturedStones.black += currentCaptured.length;
                else capturedStones.white += currentCaptured.length;
            }

            const ownGroup = findGroup(row, col, currentTurn);
            if (countLiberties(ownGroup) === 0 && currentCaptured.length === 0) {
                gameState[row][col] = null;
                if (previewStoneEl) { previewStoneEl.remove(); previewStoneEl = null; }
                selectedCell = null; alert("자충수입니다!"); return;
            }

            let nextKo = null;
            if (currentCaptured.length === 1 && ownGroup.length === 1) {
                nextKo = { r: currentCaptured[0].r, c: currentCaptured[0].c };
            }

            const nextMoveInfo = { r: row, c: col };
            currentTurn = opponentTurn;
            updateStatus();
            renderBoardFromState();

            if(roomRef) {
                roomRef.update({
                    gameState: JSON.stringify(gameState), currentTurn: opponentTurn,
                    capturedStones: capturedStones, koCoordinate: nextKo, lastMove: nextMoveInfo
                }).catch(()=>{});
            }
        }
    }

    function resignGame() {
        if (!roomId) return; 

        if (myRole === 'spectator') {
            alert("관전자는 기권할 수 없습니다.");
            return;
        }

        const isOpponentOffline = document.getElementById('txtOpponentStatus').classList.contains('status-offline');

        if (isOpponentOffline) {
            alert("상대방이 입장한 상태에서만 기권할 수 있습니다.");
            return; 
        }

        if (confirm("정말로 기권하시겠습니까?\n패배로 기록되며 판이 초기화됩니다.")) {
            const opponentRole = (myRole === 'black') ? 'white' : 'black';
            
            if(roomRef) {
                roomRef.update({
                    winner: opponentRole, 
                    winReason: 'resign' 
                }).catch(()=>{});
            }
        }
    }

    function checkRenjuFouls(row, col) {
        for (let i = 0; i < 4; i++) { if (countContinuous(row, col, i, 'black') >= 6) { alert("🚫 [금수] 6목 이상의 장선은 금지되어 있습니다!"); return true; } }
        if (isThreeThreeWithArrayFix(row, col)) { alert("🚫 [금수] 쌍삼(3-3) 자리는 착수할 수 없습니다!"); return true; }
        if (isFourFourWithArrayFix(row, col)) { alert("🚫 [금수] 쌍사(4-4) 자리는 착수할 수 없습니다!"); return true; }
        return false;
    }

    function countContinuous(r, c, dirIdx, color) {
        const dirs = [{dr:0, dc:1}, {dr:1, dc:0}, {dr:1, dc:1}, {dr:-1, dc:1}];
        const {dr, dc} = dirs[dirIdx]; let count = 1; let nr = r + dr, nc = c + dc;
        while(inBounds(nr, nc) && gameState[nr][nc] === color) { count++; nr += dr; nc += dc; }
        nr = r - dr; nc = c - dc;
        while(inBounds(nr, nc) && gameState[nr][nc] === color) { count++; nr -= dr; nc -= dc; }
        return count;
    }

    function isThreeThreeWithArrayFix(r, c) {
        gameState[r][c] = 'black'; let openThreeCount = 0;
        const dirs = [{dr:0, dc:1}, {dr:1, dc:0}, {dr:1, dc:1}, {dr:-1, dc:1}];
        for (let i = 0; i < 4; i++) { if (isOpenThreeFix(r, c, dirs[i].dr, dirs[i].dc)) openThreeCount++; }
        gameState[r][c] = null; return openThreeCount >= 2;
    }

    function isOpenThreeFix(r, c, dr, dc) {
        let line = [];
        for (let offset = -4; offset <= 4; offset++) {
            let nr = r + dr * offset, nc = c + dc * offset;
            if (!inBounds(nr, nc)) line.push('X');
            else if (gameState[nr][nc] === 'black') line.push('1');
            else if (gameState[nr][nc] === 'white') line.push('W');
            else line.push('0');
        }
        const lineStr = line.join('');
        const patterns = ["011100", "001110", "010110", "011010"];
        for (let start = 0; start <= 3; start++) { if (patterns.includes(lineStr.substring(start, start + 6))) return true; }
        return false;
    }

    function isFourFourWithArrayFix(r, c) {
        gameState[r][c] = 'black'; let fourCount = 0;
        const dirs = [{dr:0, dc:1}, {dr:1, dc:0}, {dr:1, dc:1}, {dr:-1, dc:1}];
        for (let i = 0; i < 4; i++) { if (isFourFix(r, c, dirs[i].dr, dirs[i].dc)) fourCount++; }
        gameState[r][c] = null; return fourCount >= 2;
    }

    function isFourFix(r, c, dr, dc) {
        let line = [];
        for (let offset = -4; offset <= 4; offset++) {
            let nr = r + dr * offset, nc = c + dc * offset;
            if (!inBounds(nr, nc)) line.push('X');
            else if (gameState[nr][nc] === 'black') line.push('1');
            else if (gameState[nr][nc] === 'white') line.push('W');
            else line.push('0');
        }
        const lineStr = line.join('');
        for (let start = 0; start <= 4; start++) {
            const windowStr = lineStr.substring(start, start + 5);
            let count1 = (windowStr.match(/1/g) || []).length;
            let count0 = (windowStr.match(/0/g) || []).length;
            if (count1 === 4 && count0 === 1) return true;
        }
        return false;
    }

    function inBounds(r, c) { return r >= 0 && r < boardSize && c >= 0 && c < boardSize; }

    function findGroup(startR, startC, color) {
        const group = []; const visited = Array(boardSize).fill(null).map(() => Array(boardSize).fill(false));
        const queue = [[startR, startC]]; visited[startR][startC] = true;
        while (queue.length > 0) {
            const [r, c] = queue.shift(); group.push({r, c});
            for (let i = 0; i < 4; i++) {
                const nr = r + dr[i], nc = c + dc[i];
                if (inBounds(nr, nc) && !visited[nr][nc] && gameState[nr][nc] === color) {
                    visited[nr][nc] = true; queue.push([nr, nc]);
                }
            }
        }
        return group;
    }

    function countLiberties(group) {
        const liberties = new Set();
        for (const cell of group) {
            for (let i = 0; i < 4; i++) {
                const nr = cell.r + dr[i], nc = cell.c + dc[i];
                if (inBounds(nr, nc) && gameState[nr][nc] === null) liberties.add(`${nr},${nc}`);
            }
        }
        return liberties.size;
    }

    function updateStatus() {
        if (!roomId) return; 

        capByBlackEl.textContent = capturedStones.black;
        capByWhiteEl.textContent = capturedStones.white;
        const isMyTurn = (currentTurn === myRole);

        if (currentTurn === 'black') {
            turnBadge.classList.remove('white');
            turnText.textContent = isMyTurn ? '흑돌 차례 (당신)' : '흑돌 차례';
        } else {
            turnBadge.classList.add('white');
            turnText.textContent = isMyTurn ? '백돌 차례 (당신)' : '백돌 차례';
        }

        if (gameMode === 'omok') {
            lblKomi.textContent = "렌주룰 필터 가동"; lblKomi.style.backgroundColor = "#b33939";
            lblCapture.style.opacity = "0"; btnCounting.disabled = true; btnCounting.textContent = "오목 자동 판정";
        } else {
            lblKomi.textContent = "덤 6.5집"; lblKomi.style.backgroundColor = "#444";
            lblCapture.style.opacity = "1"; btnCounting.disabled = false; btnCounting.textContent = "🏁 계가 신청";
        }

        if (isMyTurn) {
            boardElement.classList.remove('locked');
            btnConfirm.disabled = false; btnConfirm.textContent = "➔ 착수 완료";
        } else {
            boardElement.classList.add('locked'); btnConfirm.disabled = true;
            btnConfirm.textContent = myRole === 'spectator' ? "관전 모드 상태입니다" : "상대방의 차례입니다";
        }
    }

    function syncGameMode(mode) {
        if (!roomId) return;
        const size = mode === 'omok' ? 15 : 19;
        gameMode = mode; boardSize = size;
        gameState = Array(size).fill(null).map(() => Array(size).fill(null));
        currentTurn = 'black'; capturedStones = { black: 0, white: 0 }; koCoordinate = null; lastMove = null;

        document.getElementById('btnModeBaduk').classList.toggle('active', gameMode === 'baduk');
        document.getElementById('btnModeOmok').classList.toggle('active', gameMode === 'omok');

        updateStarPoints(); renderBoardFromState(); updateStatus();

        if(roomRef) {
            roomRef.update({
                gameMode: mode, gameState: JSON.stringify(gameState),
                currentTurn: 'black', capturedStones: capturedStones, koCoordinate: null, lastMove: null,
                winner: null,
                winReason: null 
            }).catch(()=>{});
        }
    }

    function syncResetGame() {
        if (!roomId) return;
        gameState = Array(boardSize).fill(null).map(() => Array(boardSize).fill(null));
        currentTurn = 'black'; capturedStones = { black: 0, white: 0 }; koCoordinate = null; lastMove = null;
        renderBoardFromState(); updateStatus();

        if(roomRef) {
            roomRef.update({
                gameState: JSON.stringify(gameState), currentTurn: 'black',
                capturedStones: { black: 0, white: 0 }, koCoordinate: null, lastMove: null,
                winner: null,
                winReason: null 
            }).catch(()=>{});
        }
    }

    function requestAutoCounting() { if(gameMode === 'baduk' && roomId) runTerritoryCounting(); }

    function runTerritoryCounting() {
        const visited = Array(boardSize).fill(null).map(() => Array(boardSize).fill(false));
        let blackTerritory = 0; let whiteTerritory = 0;
        for (let r = 0; r < boardSize; r++) {
            for (let c = 0; c < boardSize; c++) {
                if (gameState[r][c] === null && !visited[r][c]) {
                    const region = []; const queue = [[r, c]]; const borderColors = new Set();
                    visited[r][c] = true;
                    while (queue.length > 0) {
                        const [currR, currC] = queue.shift(); region.push([currR, currC]);
                        for (let i = 0; i < 4; i++) {
                            const nr = currR + dr[i], nc = currC + dc[i];
                            if (inBounds(nr, nc)) {
                                if (gameState[nr][nc] === null) {
                                    if (!visited[nr][nc]) { visited[nr][nc] = true; queue.push([nr, nc]); }
                                } else { borderColors.add(gameState[nr][nc]); }
                            }
                        }
                    }
                    if (borderColors.size === 1) {
                        if (borderColors.has('black')) blackTerritory += region.length;
                        if (borderColors.has('white')) whiteTerritory += region.length;
                    }
                }
            }
        }
        const blackTotal = blackTerritory + capturedStones.black;
        const whiteTotal = whiteTerritory + capturedStones.white + komi;
        alert(`🏁 [결과] 흑: ${blackTotal}집 vs 백: ${whiteTotal}집`);
    }
</script>
